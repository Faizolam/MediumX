
# ===== docker-compose-prod.yml (Updated for GCP-like environment) =====
version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Production-like environment variables
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}  
      - DB_NAME=${DB_NAME}
      - CLOUD_SQL_CONNECTION_NAME=${CLOUD_SQL_CONNECTION_NAME}
      - UPLOAD_BUCKET_NAME=${UPLOAD_BUCKET_NAME}
      - STATIC_BUCKET_NAME=${STATIC_BUCKET_NAME}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ENVIRONMENT=production
      - FRONTEND_URL=${FRONTEND_URL}
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
    volumes:
      - postgres-db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-db:

networks:
  app-network:
    driver: bridge



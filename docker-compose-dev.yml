# ===== docker-compose-dev.yml (For Local Development Only) =====
version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Local development environment variables
      - DATABASE_HOSTNAME=postgres
      - DATABASE_PORT=5432
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-dev_password}
      - DATABASE_NAME=${DATABASE_NAME:-mediumx}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-mediumx_user}
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ENVIRONMENT=development
      - UPLOAD_BUCKET_NAME=local-uploads  # For local dev
      - STATIC_BUCKET_NAME=local-static   # For local dev
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - postgres
    volumes:
      - .:/usr/src/app  # For development hot reload
      - ./Upload:/usr/src/app/Upload  # Local file uploads
    networks:
      - app-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"  # Different port to avoid conflicts
    depends_on:
      - backend
    volumes:
      - ./client:/usr/share/nginx/html:ro  # Read-only mount for development
    networks:
      - app-network

  postgres:
    image: postgres:15  # Match your Cloud SQL version
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-dev_password}
      - POSTGRES_DB=${DATABASE_NAME:-mediumx}
      - POSTGRES_USER=${DATABASE_USERNAME:-mediumx_user}
    volumes:
      - postgres-db:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Standard PostgreSQL port
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-mediumx_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # # Optional: Add Redis for caching (recommended for production-like local env)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

volumes:
  postgres-db:

networks:
  app-network:
    driver: bridge









# .github/workflows/build-deploy.yaml

name: Build and Deploy to GCP

on:
  # push:
  #   branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: opportune-chess-462012-a3
  REGION: us-central1
  SERVICE_NAME: mediumx-backend
  REPOSITORY: mediumx-backend-repo

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Set up test environment and run migrations
      env:
        DATABASE_HOSTNAME: localhost
        DATABASE_PORT: 5432
        DATABASE_USERNAME: test_user
        DATABASE_PASSWORD: test_password
        DATABASE_NAME: test_db
        SECRET_KEY: test-secret-key-for-testing-only
        ALGORITHM: HS256
        ACCESS_TOKEN_EXPIRE_MINUTES: 60
        ENVIRONMENT: testing
      run: |
        alembic upgrade head

    - name: Run tests
      env:
        DATABASE_HOSTNAME: localhost
        DATABASE_PORT: 5432
        DATABASE_USERNAME: test_user
        DATABASE_PASSWORD: test_password
        DATABASE_NAME: test_db
        SECRET_KEY: test-secret-key-for-testing-only
        ALGORITHM: HS256
        ACCESS_TOKEN_EXPIRE_MINUTES: 60
        ENVIRONMENT: testing
      run: |
        pytest tests/ -v --tb=short

  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        project_id: ${{ env.PROJECT_ID }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

    - name: Build Docker image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:${{ github.sha }} .
        docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:${{ github.sha }} \
                   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:latest

    - name: Push Docker image to Artifact Registry
      run: |
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:${{ github.sha }}
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:latest

    - name: Run database migrations
      run: |
        # Get database connection details from secrets
        gcloud run jobs create migration-job-${{ github.sha }} \
          --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:${{ github.sha }} \
          --region=${{ env.REGION }} \
          --service-account=${{ secrets.CLOUD_RUN_SERVICE_ACCOUNT }} \
          --set-env-vars=ENVIRONMENT=production \
          --set-secrets=DB_PASS=db-password-secret:latest \
          --set-env-vars=DB_USER=${{ secrets.DB_USER }} \
          --set-env-vars=DB_NAME=${{ secrets.DB_NAME }} \
          --set-env-vars=CLOUD_SQL_CONNECTION_NAME=${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
          --vpc-connector=mediumx-vpc-connector \
          --args="alembic,upgrade,head"
        
        # Execute the migration job
        gcloud run jobs execute migration-job-${{ github.sha }} --region=${{ env.REGION }} --wait
        
        # Clean up the job
        gcloud run jobs delete migration-job-${{ github.sha }} --region=${{ env.REGION }} --quiet
      
    - name: Invalidate CDN Cache (if using Cloud CDN)
      run: |
        # This would invalidate CDN cache if you set up Cloud CDN
        # gcloud compute url-maps invalidate-cdn-cache mediumx-url-map --path="/*" --async

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE_NAME }}
        region: ${{ env.REGION }}
        image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:${{ github.sha }}
        flags: |
          --allow-unauthenticated
          --max-instances=10
          --memory=512Mi
          --cpu=1
          --timeout=300
          --set-env-vars=ENVIRONMENT=production
          --service-account=${{ secrets.CLOUD_RUN_SERVICE_ACCOUNT }}

    - name: Upload frontend to Cloud Storage
      run: |
        # Sync frontend files to Cloud Storage
        gsutil -m rsync -r -d ./client/ gs://${{ secrets.STATIC_BUCKET_NAME }}/
        
        # Set proper content types and cache headers
        gsutil -m setmeta -h "Content-Type:text/html" -h "Cache-Control:no-cache" gs://${{ secrets.STATIC_BUCKET_NAME }}/**/*.html || true
        gsutil -m setmeta -h "Content-Type:text/css" -h "Cache-Control:max-age=31536000" gs://${{ secrets.STATIC_BUCKET_NAME }}/**/*.css || true
        gsutil -m setmeta -h "Content-Type:application/javascript" -h "Cache-Control:max-age=31536000" gs://${{ secrets.STATIC_BUCKET_NAME }}/**/*.js || true
        gsutil -m setmeta -h "Cache-Control:max-age=31536000" gs://${{ secrets.STATIC_BUCKET_NAME }}/**/*.{png,jpg,jpeg,svg,ico} || true

    - name: Get deployment URLs
      id: deploy
      run: |
        BACKEND_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
        echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
        echo "🚀 Deployment successful!"
        echo "Backend URL: $BACKEND_URL"
        echo "Frontend URL: https://${{ secrets.DOMAIN_NAME }}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        project_id: ${{ env.PROJECT_ID }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

    - name: Build and Deploy to Staging
      run: |
        # Build staging image
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:staging-${{ github.sha }} .
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:staging-${{ github.sha }}
        
        # Deploy to staging service
        gcloud run deploy mediumx-backend-staging \
          --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend-image:staging-${{ github.sha }} \
          --region ${{ env.REGION }} \
          --allow-unauthenticated \
          --max-instances 5 \
          --memory 256Mi \
          --set-env-vars ENVIRONMENT=staging \
          --service-account ${{ secrets.CLOUD_RUN_SERVICE_ACCOUNT }}

    - name: Output staging deployment info
      run: |
        STAGING_URL=$(gcloud run services describe mediumx-backend-staging --region=${{ env.REGION }} --format='value(status.url)')
        echo "🎯 Staging deployment completed!"
        echo "Staging URL: $STAGING_URL"
        
